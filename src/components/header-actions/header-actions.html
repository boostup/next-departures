<header class="header-actions">
    <div class="header-main">
        <h1 class="route-display">
            <span id="origin-station" class="origin-station"></span>
            <span class="route-arrow">➔</span>
            <span id="destination-station" class="destination-station"></span>
        </h1>
        <button id="quick-fav-btn" class="icon-btn" title="Définir ce trajet par défaut"
            aria-label="Définir ce trajet par défaut">
            <span class="icon-placeholder" data-icon="star" data-size="24"></span>
        </button>
    </div>
    <button id="go-settings-btn" class="settings-gear-btn" title="Réglages"
        aria-label="Ouvrir les réglages">
        <span class="icon-placeholder" data-icon="cog" data-size="24"></span>
    </button>
</header>
