<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNCF Live Board</title>
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <div id="app" class="app-layout">

        <!-- ÉCRAN PRINCIPAL (TABLEAU DE BORD) -->
        <div id="view-board" class="view-screen active">
            <header class="view-header">
                <div class="header-main">
                    <h1 id="route-display">Chargement...</h1>
                    <button id="quick-fav-btn" class="icon-btn" title="Définir ce trajet par défaut">☆</button>
                </div>
                <button id="go-settings-btn" class="settings-gear-btn">⚙️</button>
            </header>

            <section class="search-section">
                <div class="input-row">
                    <button id="locate-btn" class="action-btn-accent" title="Me géolocaliser">📍</button>
                    <div class="autocomplete-container">
                        <input id="dest-input" class="text-input" placeholder="Où allez-vous ? (ex: Vichy)"
                            autocomplete="off">
                        <div id="suggestions-box" class="suggestions-dropdown"></div>
                    </div>
                    <button id="search-action-btn" class="action-btn">OK</button>
                </div>
            </section>

            <section class="board-section">
                <div id="journeys-board">
                    <div class="sys-msg">Initialisation du tableau des départs...</div>
                </div>
            </section>

            <button id="manual-refresh-btn" class="refresh-main-btn">Actualiser</button>
        </div>

        <!-- ÉCRAN RÉGLAGES PRINCIPAL -->
        <div id="view-settings" class="view-screen">
            <header class="view-header">
                <button class="back-btn" data-target="board">◀ Retour</button>
                <h1>Réglages</h1>
                <div style="width: 44px;"></div>
            </header>

            <ul class="settings-list">
                <li class="settings-item" data-navigate="settings-favorites">
                    <span class="item-icon">⭐</span>
                    <span class="item-label">Trajets favoris</span>
                    <span class="item-accessory">chevron</span>
                </li>
                <li class="settings-item" data-navigate="settings-filters">
                    <span class="item-icon">⚙️</span>
                    <span class="item-label">Filtres de recherche</span>
                    <span class="item-accessory">chevron</span>
                </li>
                <li class="settings-item-static">
                    <span class="item-icon">🌓</span>
                    <span class="item-label">Mode Sombre</span>
                    <label class="switch">
                        <input id="theme-toggle" type="checkbox">
                        <span class="slider"></span>
                    </label>
                </li>
            </ul>
        </div>

        <!-- SOUS-ÉCRAN FAVORIS -->
        <div id="view-settings-favorites" class="view-screen">
            <header class="view-header">
                <button class="back-btn" data-target="settings">◀ Réglages</button>
                <h1>Favoris</h1>
                <div style="width: 44px;"></div>
            </header>
            <div class="view-content">
                <favorites-manager></favorites-manager>
            </div>
        </div>

        <!-- SOUS-ÉCRAN FILTRES -->
        <div id="view-settings-filters" class="view-screen">
            <header class="view-header">
                <button class="back-btn" data-target="settings">◀ Réglages</button>
                <h1>Filtres</h1>
                <div style="width: 44px;"></div>
            </header>
            <div class="view-content">
                <search-settings></search-settings>
            </div>
        </div>

    </div>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
